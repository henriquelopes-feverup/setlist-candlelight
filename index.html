<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setlist Candlelight</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #000, #1a1a1a);
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.container {
  text-align: center;
}
button {
  background: gold;
  border: none;
  padding: 15px 25px;
  margin: 10px;
  font-size: 18px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}
button:hover {
  background: #d4af37;
}
.hidden {
  display: none;
}
ul {
  text-align: left;
  max-width: 400px;
  margin: 20px auto;
}
.botoes {
  display: flex;
  justify-content: center;
  gap: 10px;
}
.saiba {
  background: #0b1f3a;
  color: white;
}
.saiba:hover {
  background: #132c55;
}
</style>
</head>
<body>

<div class="container">
  <h1>Candlelight</h1>
  <p>Escolha uma setlist</p>

  <div id="menu">
    <button onclick="showSetlist('mix')">Coldplay + Imagine Dragons</button>
    <button onclick="showSetlist('coldplay')">Coldplay</button>
    <button onclick="showSetlist('vivaldi')">Vivaldi</button>
    <button onclick="showSetlist('classicos')">Clássicos Atemporais</button>
    <button onclick="showSetlist('taylor')">Taylor Swift</button>
    <button onclick="showSetlist('linkin')">Linkin Park</button>
    <button onclick="showSetlist('metallica')">Metallica</button>
    <button onclick="showSetlist('adele')">Adele</button>
  </div>

  <div id="setlist" class="hidden">
    <h2 id="title"></h2>
    <ul id="list"></ul>

    <div class="botoes">
      <button onclick="voltar()">Voltar</button>
      <a href="https://feverup.com/pt/sao-paulo/candlelight" target="_blank">
        <button class="saiba">Saiba mais</button>
      </a>
    </div>

  </div>
</div>

<script>

  ],

};

function showSetlist(tipo) {
  document.getElementById('menu').classList.add('hidden');
  document.getElementById('setlist').classList.remove('hidden');

  const list = document.getElementById('list');
  list.innerHTML = "";

  const titles = {
    mix: 'Coldplay + Imagine Dragons',
    coldplay: 'Coldplay',
    vivaldi: 'Vivaldi - As Quatro Estações',
    classicos: 'Clássicos Atemporais',
    taylor: 'Taylor Swift',
    linkin: 'Tributo a Linkin Park',
    metallica: 'Tributo a Metallica',
    adele: 'Tributo a Adele'
  };

  document.getElementById('title').innerText = titles[tipo];

  setlists[tipo].forEach(item => {
    const li = document.createElement('li');
    li.innerText = item;
    list.appendChild(li);
  });
}

function voltar() {
  document.getElementById('menu').classList.remove('hidden');
  document.getElementById('setlist').classList.add('hidden');
}
</script>

</body>
</html>
